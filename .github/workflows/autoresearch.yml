name: Autoresearch — Strategy Update

on:
  schedule:
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  autoresearch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis + strategy rewrite
        run: python pipeline/autoresearch.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Cleo Bot"
          git config user.email "cleo@github-actions"
          git add strategy.md Analytics/
          git diff --staged --quiet || git commit -m "feat: strategy update $(date +%Y-%m-%d)"
          git push
