name: Scrape LinkedIn Metrics

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape metrics
        run: python pipeline/apify_scraper.py
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: metrics ${{ github.run_id }}"
          file_pattern: "results.tsv Posts/"
          commit_user_name: Cleo Bot
          commit_user_email: cleo@github-actions
