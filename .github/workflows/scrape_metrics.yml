name: Scrape LinkedIn Metrics

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape metrics
        run: python pipeline/apify_scraper.py
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Cleo Bot"
          git config user.email "cleo@github-actions"
          git add results.tsv Posts/
          git diff --staged --quiet || git commit -m "data: metrics $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
