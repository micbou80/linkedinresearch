name: Daily Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Research — Reddit + blogs + AI news
        run: python pipeline/research.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate post + lead magnet
        run: python pipeline/generate_content.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Cleo Bot"
          git config user.email "cleo@github-actions"
          git add "Posts/" "Lead Magnets/" "data/research_today.md"
          git diff --staged --quiet || git commit -m "feat: daily content $(date +%Y-%m-%d)"
          git push
